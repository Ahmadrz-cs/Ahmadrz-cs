# Fully funded asset
# All investors in one place for ease of parsing

include:
    - ../standardUsers.yaml
    - ../templates/baseTrade.yaml

# dynamic parameters are broken atm
# https://github.com/nelmio/alice/issues/902
parameters:
    shares_royalglade_ben_1: 7312
    shares_royalglade_ben_2: 4638
    shares_royalglade_freya_1: 5398
    shares_royalglade_holly_1: 2971
    shares_royalglade_holly_2: 1862
