App\Entity\TradeOrderStatusLog:
    buy_order_status_active_royalglade_{ben_1, ben_2, freya_1, holly_1, holly_2, jim_1, jim_2, jim_3, lorna_1, lorna_2, lorna_3, jim_4}:
        tradeOrder: "@buy_order_royalglade_<current()>"
        status: <(App\Entity\Enum\TradeOrderStatus::Active)>
        occuredAt: "@buy_order_royalglade_<current()>->createdAt"
    buy_order_status_completed_royalglade_{ben_1, ben_2, freya_1, holly_1, holly_2, jim_1, jim_2, jim_3, lorna_1, lorna_2, lorna_3, jim_4}:
        tradeOrder: "@buy_order_royalglade_<current()>"
        status: <(App\Entity\Enum\TradeOrderStatus::Completed)>
        occuredAt: "@buy_order_royalglade_<current()>->createdAt"
    sell_order_status_submitted_royalglade_{ben_1, ben_2, holly_1}:
        tradeOrder: "@sell_order_secondary_royalglade_<current()>"
        status: <(App\Entity\Enum\TradeOrderStatus::Submitted)>
        occuredAt: "@sell_order_secondary_royalglade_<current()>->createdAt"
    sell_order_status_active_royalglade_{ben_1, ben_2}:
        tradeOrder: "@sell_order_secondary_royalglade_<current()>"
        status: <(App\Entity\Enum\TradeOrderStatus::Active)>
        occuredAt: "<dateTimeBetween('third thursday of -3 months', 'last thursday of -3 months')>"
    # Fully funded sell orders
    sell_order_status_completed_royalglade_{ben_1}:
        tradeOrder: "@sell_order_secondary_royalglade_<current()>"
        status: <(App\Entity\Enum\TradeOrderStatus::Completed)>
        occuredAt: "@buy_order_royalglade_lorna_3->createdAt"

App\Entity\ShareTrade:
    share_trade_royalglade_{ben_1, ben_2, freya_1, holly_1, holly_2, jim_1, jim_2, jim_3, lorna_1}:
        buyOrder: "@buy_order_royalglade_<current()>"
        sellOrder: "@sell_order_initial_royalglade"
        numberOfShares: "@buy_order_royalglade_<current()>->numberOfShares"
        pricePerShare: "@buy_order_royalglade_<current()>->pricePerShare"
        createdAt: "@buy_order_royalglade_<current()>->createdAt"
    # Secondary market
    share_trade_royalglade_{lorna_2, lorna_3}:
        buyOrder: "@buy_order_royalglade_<current()>"
        sellOrder: "@sell_order_secondary_royalglade_ben_1"
        numberOfShares: "@buy_order_royalglade_<current()>->numberOfShares"
        pricePerShare: "@buy_order_royalglade_<current()>->pricePerShare"
        createdAt: "@buy_order_royalglade_<current()>->createdAt"
    share_trade_royalglade_{jim_4}:
        buyOrder: "@buy_order_royalglade_<current()>"
        sellOrder: "@sell_order_secondary_royalglade_ben_2"
        numberOfShares: "@buy_order_royalglade_<current()>->numberOfShares"
        pricePerShare: "@buy_order_royalglade_<current()>->pricePerShare"
        createdAt: "@buy_order_royalglade_<current()>->createdAt"

App\Entity\ShareTradeStatusLog:
    trade_status_unsettled_royalglade_{ben_1, ben_2, freya_1, holly_1, holly_2, jim_1, jim_2, jim_3, jim_4, lorna_1, lorna_2, lorna_3}:
        shareTrade: "@share_trade_royalglade_<current()>"
        status: <(App\Entity\Enum\TradeStatus::Unsettled)>
        occuredAt: "@share_trade_royalglade_<current()>->createdAt"
    trade_status_settled_royalglade_{ben_1, holly_1, freya_1}:
        shareTrade: "@share_trade_royalglade_<current()>"
        status: <(App\Entity\Enum\TradeStatus::Settled)>
        occuredAt: "<(new DateTime('first saturday of -13 months 14:24:15'))>"
    trade_status_settled_royalglade_{ben_2, jim_1}:
        shareTrade: "@share_trade_royalglade_<current()>"
        status: <(App\Entity\Enum\TradeStatus::Settled)>
        occuredAt: "<(new DateTime('first saturday of -11 months 09:15:16'))>"
    trade_status_settled_royalglade_{holly_2, jim_2, jim_3, lorna_1}:
        shareTrade: "@share_trade_royalglade_<current()>"
        status: <(App\Entity\Enum\TradeStatus::Settled)>
        occuredAt: "<(new DateTime('first saturday of -9 months 17:11:34'))>"
    trade_status_settled_royalglade_{lorna_2}:
        shareTrade: "@share_trade_royalglade_<current()>"
        status: <(App\Entity\Enum\TradeStatus::Settled)>
        occuredAt: "<(new DateTime('first saturday of -1 months 17:11:34'))>"
