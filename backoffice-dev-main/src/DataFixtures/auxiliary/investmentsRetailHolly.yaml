include:
    - ../standardUsers.yaml
    - ../templates/baseOffering.yaml
    - ../templates/baseInvestment.yaml

App\Entity\Investment:
    investment{holly_lodge1} (extends investment_base):
        user: "@userholly"
        offering: "@offeringlodge"
        orgPricePerShare: "@offeringlodge->pricePerShare"
        share_amount: 352
        createdAt: "<(new DateTime('last monday of last month'))>"
    investment{holly_royalway1} (extends investment_base):
        user: "@userholly"
        offering: "@offeringroyalway"
        orgPricePerShare: "@offeringroyalway->pricePerShare"
        share_amount: 566
    investment{holly_saturna1} (extends investment_base):
        user: "@userholly"
        offering: "@offeringsaturna"
        orgPricePerShare: "@offeringsaturna->pricePerShare"
        share_amount: 319
    investment{holly_clarence1} (extends investment_base):
        user: "@userholly"
        offering: "@offeringclarence"
        orgPricePerShare: "@offeringclarence->pricePerShare"
        share_amount: 250
    investment{holly_clarence2} (extends investment_base):
        user: "@userholly"
        offering: "@offeringclarence"
        orgPricePerShare: "@offeringclarence->pricePerShare"
        share_amount: 140
    investment{holly_nixis1} (extends investment_base):
        user: "@userholly"
        offering: "@offeringnixis"
        orgPricePerShare: "@offeringnixis->pricePerShare"
        share_amount: 1000
        type: "prefunding"
    investment{holly_royalglade1} (extends investment_base):
        user: "@userholly"
        offering: "@offeringroyalglade"
        orgPricePerShare: "@offeringroyalglade->pricePerShare"
        share_amount: 2971
        createdAt: "<dateTimeBetween('-1 week', '-1 day')>"
    investment{holly_royalglade2} (extends investment_base):
        user: "@userholly"
        offering: "@offeringroyalglade"
        orgPricePerShare: "@offeringroyalglade->pricePerShare"
        share_amount: 1862
        createdAt: "<dateTimeBetween('-1 week', '-1 day')>"


App\Entity\InvestmentStatus:
    investmentstatusholly_{lodge1, royalway1, royalglade1, royalglade2, clarence1, nixis1} (extends investmentstatus_base):
    investmentstatusholly_{saturna1, clarence2} (extends investmentstatus_base):
        lifecycleStatus: "approved"

App\Entity\InvestmentDocuments:
    idoc_holly_lodge{1}:
        investment: "@investmentholly_lodge<current()>"
        document: "@sharecert_holly_lodge<current()>"
    idoc_holly_royalway{1}:
        investment: "@investmentholly_royalway<current()>"
        document: "@sharecert_holly_royalway<current()>"
    idoc_holly_saturna{1}:
        investment: "@investmentholly_saturna<current()>"
        document: "@sharecert_holly_saturna<current()>"
    idoc_holly_nixis{1}:
        investment: "@investmentholly_nixis<current()>"
        document: "@sharecert_holly_nixis<current()>"
    idoc_holly_royalglade{1..2}:
        investment: "@investmentholly_royalglade<current()>"
        document: "@sharecert_holly_royalglade<current()>"


App\Entity\Document:
    sharecert_holly_lodge{1} (extends doc_certificate):
    sharecert_holly_royalway{1} (extends doc_certificate):
    sharecert_holly_saturna{1} (extends doc_certificate):
    sharecert_holly_nixis{1} (extends doc_certificate):
    sharecert_holly_royalglade{1..2} (extends doc_certificate):

App\Entity\Offering:
    relisting{holly_lodge1} (extends offering_base):
        sell_investment: "@investment<current()>"
        asset: "@assetlodge"
        name: "@offeringlodge->name"
        pricePerShare: "@offeringlodge->pricePerShare"
        noOfShares: 152
        createdBy: "@userholly"
        lifecyclestatus: "submitted"