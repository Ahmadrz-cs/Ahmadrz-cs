App\Entity\TransferOrder:
    transferOrder_base (template):
        transferType: "custom"
        description: "<sentence()>"
        scheduledFor: "<(new DateTime('first day of this month'))>"
        status: "draft"
        createdBy: "@userA1"
        createdAt: "@self->scheduledFor"
    
    # see predefined descriptions in TransferOrderPreset.php
    transferOrder_income_transfer (template, extends transferOrder_base):
        transferType: "asset income processing"
        description: "Process asset income"
    transferOrder_fee_collection (template, extends transferOrder_base):
        transferType: "fee collection"
        description: "Collect Yielders fees"
    transferOrder_settlement (template, extends transferOrder_base):
        transferType: "investment settlement"
        description: "Settle investments and stamp duty"
    transferOrder_prefunder_allocation (template, extends transferOrder_base):
        transferType: "payment allocation"
        description: "Allocate funds to repay prefunders"
    transferOrder_income_disaggregation (template, extends transferOrder_base):
        transferType: "income disaggregation"
        description: "Split multi-asset aggregated income"

# default to transfer from "actual" to "hold" asset wallets (rebalancing)
App\Entity\TransferRequest:
