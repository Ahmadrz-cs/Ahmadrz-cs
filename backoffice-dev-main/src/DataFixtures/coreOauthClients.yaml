# Not clear how to adaptively set redirect uri, including all environments for now
# if local environment is different, this will need to be tweaked
League\Bundle\OAuth2ServerBundle\ValueObject\RedirectUri:
    redirect_dev_local:
        __construct:
            - http://front.dev.local/auth/callback
    # Default frontend HTTP port if not using Traefik reverse proxy
    redirect_dev_local_8001:
        __construct:
            - http://front.dev.local:8001/auth/callback
    # Envs that prefer HTTP (for now)
    redirect_{dev, staging, rc}:
        __construct:
            - https://<current()>-front.yielderverse.co.uk/auth/callback
    redirect_forerunner_{localhost, 127.0.0.1}:
        __construct:
            - http://<current()>:3000/api/auth/callback/yielders
    redirect_demo_{yielders, yielderverse}:
        __construct:
            - https://demo.<current()>.co.uk/auth/callback

# supported grants must be a subset of those configured in config.yaml
League\Bundle\OAuth2ServerBundle\ValueObject\Grant:
    grant_{client_credentials, password, refresh_token, authorization_code}:
        __construct:
            - <current()>

# scopes are subject to change and MUST be defined in config as well
# in Alice v3, alternative
# __construct: "<str_replace('_', ':', $current)>"
League\Bundle\OAuth2ServerBundle\ValueObject\Scope:
    scope_{asset, offering, investment, payout, user}_read:
        __construct:
            - <current()>:read
    scope_{asset, offering, investment, payout, user}_write:
        __construct:
            - <current()>:write

# Populate some existing oauth2 artifacts
League\Bundle\OAuth2ServerBundle\Model\AccessToken:
    access_token_active{5..60, 8}:
        __construct:
            - "<uuid()>"
            - "<(new DateTimeImmutable('+' . $current . 'minutes'))>"
            - "@client001"
            - null
            - []
    access_token_expired{10..100, 10}:
        __construct:
            - "<uuid()>"
            - "<(new DateTimeImmutable('-' . $current . 'minutes'))>"
            - "@client001"
            - null
            - []
League\Bundle\OAuth2ServerBundle\Model\AuthorizationCode:
    auth_code_active{1..10, 3}:
        __construct:
            - "<uuid()>"
            - "<(new DateTimeImmutable('+' . $current . 'minutes'))>"
            - "@client001"
            - null
            - []
    auth_code_expired{1..20, 5}:
        __construct:
            - "<uuid()>"
            - "<(new DateTimeImmutable('-' . $current . 'minutes'))>"
            - "@client001"
            - null
            - []
League\Bundle\OAuth2ServerBundle\Model\RefreshToken:
    refresh_token_active{5..30, 5}:
        __construct:
            - "<uuid()>"
            - "<(new DateTimeImmutable('+' . $current . 'days'))>"
    refresh_token_expired{10..50, 10}:
        __construct:
            - "<uuid()>"
            - "<(new DateTimeImmutable('-' . $current . 'days'))>"
