# must use set methods for > 1 argument https://www.php.net/manual/en/functions.arguments.php#functions.variable-arg-list

App\Entity\UserClient:
    userClient{001}:
        __construct:
            - "@userA1"
            - "@client001"
        alias: yielderverse
        description: "Yielderverse development and test client"

    userClient{002}:
        __construct:
            - "@userlorna"
            - "@client<current()>"
        alias: vendaland
        description: "External vendor test client"

