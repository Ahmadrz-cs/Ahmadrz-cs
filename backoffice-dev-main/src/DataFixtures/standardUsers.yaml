        wordsOfOwn: "Top yielder application comments"

App\Entity\Status:
    userstatus{ben, holly, jim, freya, anne} (extends userstatus_base):
    userstatus{sally} (extends userstatus_base):
        isRegCompleted: false
        isApproved: false
        lifecycleStatus: "email_verified"
    userstatus{regcomplete} (extends userstatus_base):
        approvedOn: null
        isApproved: false
        lifecycleStatus: "registration_complete"
    userstatus{isblocked} (extends userstatus_base):
        isBlocked: true
        lifecycleStatus: "blocked"

App\Entity\UserSecurity:
    # Disable email totp for ben as it is the most commonly used one
    usersecurity{ben} (extends usersecurity_base):
        mfaEmail: false
    usersecurity{holly, jim, freya, sally, anne, regcomplete, isblocked} (extends usersecurity_base):

App\Entity\Address:
    useraddress{ben, holly, jim, freya, sally, anne}:
        user: "@user<current()>"
        address1: "<numberBetween(1,128)> <streetName()>"
        city: "<city()>"
        postCode: "<postcode()>"
        country: "GB"

App\Entity\UserDocument:
    userdoc{ben, jim, holly, freya, sally, anne}:
        user: "@user<current()>"
        document: "@doc_poi<current()>"
    userdoc_{poa, poc}:
        user: "@userben"
        document: "@doc_<current()>"

App\Entity\Document:
    doc_poi{ben, jim, holly, freya, sally, anne} (extends doc_poi):
    doc_poa (extends doc_pdf):
        tag: "proof_of_address"
    doc_poc (extends doc_pdf):
        tag: "proof_of_company"

App\Entity\UserCustomFields:
    usercustomfield{sally}:
        user: "@user<current()>"
        fieldKey: "salesforce_id"
        fieldValue: "003g500000EhLxCAAV"
    usercustomfield{jim}:
