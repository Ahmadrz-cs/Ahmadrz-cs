        # params: 'a:1:{s:4:"user";s:22:"App\Entity\User";}'
        body: '\Dear {{user.fullname}},<br><br><p>Congratulations, your onboarding for the Top Yielder process is now complete. You will now be able to view and directly invest into Top Yielder-exclusive opportunities including development and prefunding projects through the platform.</p><p>You are now also subscribed to the Top Yielder mailing list, meaning you will receive automatic notifications of any new opportunities on launch.</p><p>If you have any questions, please do get in touch with the team via the contact details below.</p><p>Yielders Investor Relations<br>0044 (0) 207 205 4650 (WhatsApp enabled)<br><a href="mailto:ir@yielders.co.uk">ir@yielders.co.uk</a></p>'
        
