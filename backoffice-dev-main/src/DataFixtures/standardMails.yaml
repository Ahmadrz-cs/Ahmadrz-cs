        body: '\Hi Team Yielders, <br/><br>

              <strong>{{user.fullname}} - {{user.email}}</strong> has signed up to your site.
              <br/>'
    user.password.forgot:
            slug: 'user.password.forgot'
            subject: 'Password Reset '
            name: 'Password Reset '
            sendAdmin: true
            sendUser: true            
            # params: 'a:1:{s:4:"user";s:22:"App\Entity\User";}'
            body: '\Hi {{user.fullname}}, <br/><br/>

            We have received your request to reset your Yielders password.<br/><br/>

            <strong>Password Re-set:</strong><br/>
            1) Your Password must include at least 8 characters including a minimum of 1 capital letter and 1 number.<br/><br/>

            Click here to create a new password: <br/>
            <a href="{{url}}">Reset Password</a>
            <br/><br/>
            1) Caution - This link will expire within 24 hours.<br/>
            2) Once password has been reset, you can log into your account immediately.<br/>
            3) If you have any further problems - please do not hesitate to get in contact with team@yielders.co.uk, quoting your user email account.<br/>'
    user.password.forgot.admin:
            slug: 'user.password.forgot.admin'
