    mangopay.payin_banktransfer:
        slug: 'mangopay.payin_banktransfer'
        subject: 'Bankwire Transfer Details'
        name: 'Bankwire Transfer Details'
        sendAdmin: true
        sendUser: true
        # params: 'a:1:{s:4:"user";s:22:"App\Entity\User";}'
        body : '\Dear {{user.fullname}},<br><br>

        Thank you for indicating that you will be making a bank transfer into your Yielders Account. UK bank transfers can clear on the same working day provided that the correct <span style="color:#ff1a1a;font-weight: bold;">wire reference</span> and <span style="color:#ff1a1a;font-weight: bold;">amount triggered</span> via the platform match the values <span style="color:#ff1a1a;font-weight: bold;"> exactly</span> as shown below.
        <br><br>
        For more info on International bank transfers, please click here - <a href="http://help.yielders.co.uk/en/articles/3436595-bankwire-transfers" target="_blank" rel="noopener noreferrer">http://help.yielders.co.uk/en/articles/3436595-bankwire-transfers</a>
        <br><br>

        <strong style="font-size:24px;">UK Bank Transfer:</strong><br><br>

        <strong>Amount:</strong><span style="color:#ff1a1a;"> £{{ Amount }}</span><br> 
        <strong>Wire Reference:</strong><span style="color:#ff1a1a;"> {{ wireReference }}</span><br> 
        <strong>Owner:</strong> {{ ownerName }}<br>
        <strong>Settlement Bank:</strong> Barclays<br>
        <strong>Sort Code:</strong> 20-00-00<br>
        <strong>Account Number:</strong> 63956474<br>
        <strong>Address:</strong> 1 Churchill Place, London, E14 5HP<br>
        <strong>Country:</strong> United Kingdom<br><br>


        <strong style="font-size:24px;">International Bank Transfer:</strong><br><br>

        Note that any bank charges will be deducted.<br>
        <strong>Amount:</strong><span style="color:#ff1a1a;"> £{{ Amount }}</span><br> 
        <strong>Wire Reference:</strong><span style="color:#ff1a1a;"> {{ wireReference }}</span><br>
        <strong>Owner:</strong> {{ ownerName }}<br>
        <strong>Settlement Bank:</strong> Barclays<br>
        <strong>IBAN:</strong> GB09 BARC 2000 0063 9564 74<br>
        <strong>SWIFT/BIC:</strong> {{ BIC }}<br>
        <strong>Address:</strong> 1 Churchill Place, London, E14 5HP<br>
        <strong>Country:</strong> United Kingdom<br><br>

        Most online banking sites allow you to specify a reference for the transfer; please refer to the reference shown above which must be entered.
        <br><br>'
