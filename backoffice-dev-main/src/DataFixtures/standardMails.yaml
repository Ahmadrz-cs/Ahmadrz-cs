App\Entity\Mail:
    investment.new:
        slug: 'investment.new'
        subject: 'Thank You for Investing'
        name: 'Thank You for Investing'
        sendAdmin: true
        sendUser: true
        # params: 'a:3:{s:10:"investment";s:32:"App\Entity\Investment";s:5:"asset";s:27:"App\Entity\Asset";s:8:"offering";s:30:"App\Entity\Offering";}'
        body: '\Hello {{user.fullname}}, <br/><br/>
        Your investment into <strong>{{asset.name}} - {{offering.name}}</strong> of <strong>{{investment.investmentValue}} GBP</strong> has been registered successfully.
        <br/><br/>We will notify you at the end of the month, once your investment has been settled and your shares are issued.
        <br/><br/>Please note - rental income is paid 1 month in arrears, from the point of settlement.
        <br/><br/>If you have any questions please contact the team; team@yielders.co.uk
        <br/><br/>Thanks,'
    investment.settled:
        slug: 'investment.settled'
        subject: 'Investment Settled'
        name: 'Investment Settled'
        sendAdmin: false
        sendUser: true        
        # params: 'a:2:{s:10:"investment";s:32:"App\Entity\Investment";s:5:"asset";s:27:"App\Entity\Asset";}'
        body: '\Hi {{user.fullname}}<br><br>
        Congratulations! Your investment has officially been settled and you are now the
        lawful owner of ({{investment.numberOfShares}}) shares in {{asset.name}}.
        <br><br>
        Our management team have been working extremely hard in the background to ensure all
        legalities and share register updates have been made. You will now be able to access your
        share certificate under your investment in My Portfolio alongside all other documentation
        in relation to your investment.
        <br>'
    user.registration:
        slug: 'user.registration'
        subject: 'Congratulations on becoming a Yielder !'
        name: 'Congratulations on becoming a Yielder !'
        sendAdmin: true
        sendUser: true        
        # params: 'a:1:{s:4:"user";s:22:"App\Entity\User";}'
        body: '\Hi {{user.fullname}}, <br/><br>
              Congratulations on becoming a Yielder!<br/><br/>
              You have made the first step towards a successful investment portfolio.<br/><br/>
              Please follow the link below to verify your email address and complete your profile.
              <br/><br/>
              <a href="{{url}}">Verify Email</a>
              <br/>'
    user.registration.admin:
        slug: 'user.registration.admin'
        subject: 'Congratulations on becoming a Yielder !'
        name: 'Congratulations on becoming a Yielder !'
        sendAdmin: true
        sendUser: true
