        name: 'New Offering created'
        sendAdmin: true
        sendUser: true        
        # params: 'a:2:{s:5:"asset";s:27:"App\Entity\Asset";s:8:"offering";s:30:"App\Entity\Offering";}'
        body: '\Dear admin team ,<br><br>
              A new offering is now available for our users to Invest in<br>
