              <br><br>
              If you have not completed your registration, please continue to do so at www.yielders.co.uk.<br>
              If you are already a registered user, please log in, top your e-wallets and  become a part of this unique investment opportunity.
              <br><br>
              If you require any further assistance, please contact us on <br>
              team@yielders.co.uk<br>
              02072054650
              <br><br>
              Thank you<br>'
