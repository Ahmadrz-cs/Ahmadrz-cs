include:
    - ../templates/baseTrade.yaml

App\Entity\TradeOrder:
    buy_order_buyback_{spa} (extends trade_order_buyback):
        asset: "@asset<current()>"
        numberOfShares: "@asset<current()>->amountOfShares"
        pricePerShare: "2.415262"
        createdBy: "@userA1"
        createdAt: "@assetstatuslog_closing_<current()>->occuredAt"
    sell_order_exit_spa_{demo3} (extends trade_order_exit):
        asset: "@assetspa"
        user: "@user<current()>"
        numberOfShares: 15614
        pricePerShare: "@buy_order_buyback_spa->pricePerShare"
        createdBy: "@userA1"
        createdAt: "@assetstatuslog_closing_spa->occuredAt"
    sell_order_exit_spa_{demo4} (extends trade_order_exit):
        asset: "@assetspa"
        user: "@user<current()>"
        numberOfShares: 84386
        pricePerShare: "@buy_order_buyback_spa->pricePerShare"
        createdBy: "@userA1"
        createdAt: "@assetstatuslog_closing_spa->occuredAt"

App\Entity\TradeOrderStatusLog:
    buy_order_status_buyback_active_{spa}:
        tradeOrder: "@buy_order_buyback_<current()>"
        status: <(App\Entity\Enum\TradeOrderStatus::Active)>
        occuredAt: "@buy_order_buyback_<current()>->createdAt"
    buy_order_status_buyback_completed_{spa}:
        tradeOrder: "@buy_order_buyback_<current()>"
        status: <(App\Entity\Enum\TradeOrderStatus::Completed)>
        occuredAt: "@assetstatuslog_archived_<current()>->occuredAt"
    sell_order_status_exit_completed_{demo3, demo4}:
        tradeOrder: "@sell_order_exit_spa_<current()>"
        status: <(App\Entity\Enum\TradeOrderStatus::Completed)>
        occuredAt: "@assetstatuslog_archived_spa->occuredAt"

App\Entity\ShareTrade:
    share_trade_spa_exit_{demo3, demo4}:
        buyOrder: "@buy_order_buyback_spa"
        sellOrder: "@sell_order_exit_spa_<current()>"
        numberOfShares: "@sell_order_exit_spa_<current()>->numberOfShares"
        pricePerShare: "@sell_order_exit_spa_<current()>->pricePerShare"
        createdAt: "@sell_order_exit_spa_<current()>->createdAt"

App\Entity\ShareTradeStatusLog:
    trade_status_settled_spa_{demo3, demo4}:
        shareTrade: "@share_trade_spa_exit_<current()>"
        status: <(App\Entity\Enum\TradeStatus::Settled)>
        occuredAt: "@assetstatuslog_archived_spa->occuredAt"
    

