        mfaEmail: false

App\Entity\Address:
    useraddress{demo1, demo2, demo3, demo4, demoadmin}:
        user: "@user<current()>"
        address1: "<numberBetween(1,128)> <streetName()>"
        city: "<city()>"
        postCode: "<postcode()>"
