include:
    - ../templates/basePayout.yaml

# For some reason, cannot use $shareholding in the payoutAmount identity/function
App\Entity\Payout:
    # Leamington Spa
    payout_demo3_spa{24} (extends payout_base):
        asset: "@assetspa"
        creditedUser: "@userdemo3"
        shareholding: 8701
        payoutAmount: "<(round((8701 / @assetspa->getAmountOfShares()) * (@assetspa->getNetProjectedIncome() / 12), 2))>"
        dueDate: "<(new DateTime('first day of -' . $current . 'month'))>"
