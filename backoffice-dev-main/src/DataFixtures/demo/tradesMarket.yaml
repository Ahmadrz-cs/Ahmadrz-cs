App\Entity\TradeOrderStatusLog:
    # Leamington Spa
    buy_order_status_active_spa_{demo3_1, demo3_2, demo4_1}:
        tradeOrder: "@buy_order_spa_<current()>"
        status: <(App\Entity\Enum\TradeOrderStatus::Active)>
        occuredAt: "@buy_order_spa_<current()>->createdAt"
    buy_order_status_completed_spa_{demo3_1, demo3_2, demo4_1}:
        tradeOrder: "@buy_order_spa_<current()>"
        status: <(App\Entity\Enum\TradeOrderStatus::Completed)>
        occuredAt: "@buy_order_spa_<current()>->createdAt"
    # Nottingham
    buy_order_status_active_notts_{demo3_1, demo3_2, demo4_1, demo4_2}:
        tradeOrder: "@buy_order_notts_<current()>"
        status: <(App\Entity\Enum\TradeOrderStatus::Active)>
        occuredAt: "@buy_order_notts_<current()>->createdAt"
    buy_order_status_completed_notts_{demo3_1, demo3_2, demo4_1, demo4_2}:
        tradeOrder: "@buy_order_notts_<current()>"
        status: <(App\Entity\Enum\TradeOrderStatus::Completed)>
        occuredAt: "@buy_order_notts_<current()>->createdAt"
    # Freight Building
    buy_order_status_active_freight_{demo3_1, demo4_1, demo2_1}:
        tradeOrder: "@buy_order_freight_<current()>"
        status: <(App\Entity\Enum\TradeOrderStatus::Active)>
        occuredAt: "@buy_order_freight_<current()>->createdAt"
