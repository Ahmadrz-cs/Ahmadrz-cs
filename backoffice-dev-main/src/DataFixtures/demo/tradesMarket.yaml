App\Entity\ShareTrade:
    # Leamington Spa
    share_trade_spa_{demo3_1, demo3_2, demo4_1}:
        buyOrder: "@buy_order_spa_<current()>"
        sellOrder: "@sell_order_initial_spa"
        numberOfShares: "@buy_order_spa_<current()>->numberOfShares"
        pricePerShare: "@buy_order_spa_<current()>->pricePerShare"
