# Fairly standard retail asset

include:
    - ../templates/baseTrade.yaml

# dynamic parameters are broken atm
# https://github.com/nelmio/alice/issues/902
parameters:
    shares_spa_demo3_1: 496

App\Entity\TradeOrder:
    # Leamington Spa
    buy_order_spa_{demo3_1} (extends trade_order_invest):
        asset: "@assetspa"
        user: "@userdemo3"
        numberOfShares: 8701
        pricePerShare: "@assetspa->pricePerShare"
        createdAt: "<dateTimeBetween('first tuesday of -26 months', 'last thursday of -26 months')>"
        createdBy: "$user"
    buy_order_spa_{demo3_2} (extends trade_order_invest):
