jms_serializer:
    property_naming:
        # separator:  _
        # lower_case: true
        id: jms_serializer.identical_property_naming_strategy
    enum_support: true
    metadata:
        auto_detection: true
        # auto_detection: false
        # need to move these directories to someplace else
        # e.g. config/metadata/jms_serializer
        directories:
            FOSUB:
                namespace_prefix: FOS\UserBundle
                path: "%kernel.project_dir%/config/serializer/FOSUB"
            App:
                namespace_prefix: App\Entity
                path: "%kernel.project_dir%/config/serializer/App"
        # directories:
        #     any-name:
        #         namespace_prefix: "My\\FooBundle"
        #         path: "@MyFooBundle/Resources/config/serializer"
        #     another-name:
        #         namespace_prefix: "My\\BarBundle"
        #         path: "@MyBarBundle/Resources/config/serializer"
