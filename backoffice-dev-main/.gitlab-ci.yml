variables:
  PHP_VERSION: "8.5"
  FRANKENPHP_VERSION: "1.11"
  BASE_FRANKENPHP_TAG: "$FRANKENPHP_VERSION-php$PHP_VERSION-alpine"
  VALKEY_VERSION: "8-alpine"
  MARIADB_VERSION: "11.8.3"
  DOCKER_VERSION: "28"

  MAILCATCHER_URL: "http://mailer:1080"
  MAILER_DSN: "smtp://mailer:1025"
  # MYSQL prefixed vars are used by the mariadb service only
  MYSQL_ROOT_PASSWORD: RomeoOscar1520
  MYSQL_DATABASE: citestdb
  MYSQL_USER: gitlabci
  MYSQL_PASSWORD: Golf9Tango12Alpha2
  # Test should use a real user not root
  # The individual db configs are used by codeception db module
  DATABASE_HOST: testdb
  DATABASE_DBNAME: $MYSQL_DATABASE
  DATABASE_USER: $MYSQL_USER
  DATABASE_PASSWORD: $MYSQL_PASSWORD
  # App database configs
  DATABASE_URL: "mysql://$DATABASE_USER:$DATABASE_PASSWORD@$DATABASE_HOST:3306/$DATABASE_DBNAME?serverVersion=$MARIADB_VERSION-MariaDB"
  MYSQL_SSL_VERIFY_SERVER_CERT: false
  
  REGISTRY_NAME: 376373716954.dkr.ecr.eu-west-2.amazonaws.com
  FRANKENPHP_IMAGE_REPO_NAME: yielderverse/backoffice-frankenphp
  FRANKENPHP_IMAGE_NAME: $REGISTRY_NAME/$FRANKENPHP_IMAGE_REPO_NAME

before_script:
  # default before_script (can be overriden)
  - echo $CI_COMMIT_REF_NAME
  - echo $CI_COMMIT_BRANCH

################################################################################
# Build-Tag-Push container image
################################################################################

.build-images:
  stage: build
  image: docker:$DOCKER_VERSION
  interruptible: true
  variables:
    AWS_ACCESS_KEY_ID: $GL_AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: $GL_AWS_SECRET_ACCESS_KEY
    TAG_PREFIX: build
    BUILD_IMAGE_TAG: $TAG_PREFIX-$PLATFORM_NAME-$CI_COMMIT_SHORT_SHA
    FINAL_IMAGE_TAG: $TAG_PREFIX-$CI_COMMIT_SHORT_SHA
  before_script:
    - apk update
    - apk add --no-cache aws-cli
    - aws --version
    - docker --version
    # Login to the AWS ECR
    - aws ecr get-login-password --region eu-west-2 | docker login --username AWS --password-stdin $REGISTRY_NAME
    # Optionally check whether the repository is accessible
    # - aws ecr describe-images --repository-name $FRANKENPHP_IMAGE_REPO_NAME
    # - docker manifest inspect $FRANKENPHP_IMAGE_NAME:latest
  script:
    # Check if the image tag already exists
    - IMAGE_META="$( aws ecr batch-get-image --repository-name=$FRANKENPHP_IMAGE_REPO_NAME --image-ids=imageTag=$BUILD_IMAGE_TAG --query 'images[].imageId.imageTag' --output text )"
    - if [ $IMAGE_META == $BUILD_IMAGE_TAG ]; then echo "$BUILD_IMAGE_TAG found skipping build"; exit 0; fi;
    # Pull the latest image as a cache
    - docker pull $FRANKENPHP_IMAGE_NAME:latest
    # If using classic builder - this won't create a separate manifest per image
    # Which means the AWS ECR cleanup works as expected
    - docker build --target frankenphp_prod --cache-from $FRANKENPHP_IMAGE_REPO_NAME:latest --platform linux/$PLATFORM_NAME --build-arg BASE_FRANKENPHP_TAG=$BASE_FRANKENPHP_TAG -t $FRANKENPHP_IMAGE_NAME:$BUILD_IMAGE_TAG  .
    - docker push $FRANKENPHP_IMAGE_NAME:$BUILD_IMAGE_TAG
    # # If using buildx
    # - docker buildx create --use --platform=linux/$PLATFORM_NAME --name $PLATFORM_NAME-builder
    # - docker buildx inspect --bootstrap
    # # Build and push with buildx and inspect manifest
    # - docker buildx build --target frankenphp_prod --cache-from $FRANKENPHP_IMAGE_REPO_NAME:latest --platform linux/$PLATFORM_NAME --build-arg BASE_FRANKENPHP_TAG=$BASE_FRANKENPHP_TAG --push -t $FRANKENPHP_IMAGE_NAME:$BUILD_IMAGE_TAG .
    # - docker manifest inspect $FRANKENPHP_IMAGE_NAME:$BUILD_IMAGE_TAG
  rules:
    - if: "$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH"
      when: on_success
      variables:
        TAG_PREFIX: dev
    - if: '$CI_COMMIT_REF_NAME =~ /^release\S*/'
      when: on_success
      variables:
        TAG_PREFIX: rc
    # On releases (where a tag is created)
    - if: $CI_COMMIT_TAG
      when: on_success
      variables:
        TAG_PREFIX: release
        FINAL_IMAGE_TAG: release-$CI_COMMIT_TAG
    # In all other cases, job (and build stage) is skippable
    # Specifically ignore merge request pipelines
    - if: $CI_PIPELINE_SOURCE != 'merge_request_event'
      when: manual
      allow_failure: true
    
build-arm64:
  extends: .build-images
  tags:
    - arm
  variables:
    PLATFORM_NAME: arm64

build-amd64:
  extends: .build-images
  tags:
    - x86
  variables:
    PLATFORM_NAME: amd64

build-manifest:
  tags:
    - quick-start
  extends: .build-images
  needs:
    - build-arm64
    - build-amd64
  script:
    - docker manifest create $FRANKENPHP_IMAGE_NAME:$FINAL_IMAGE_TAG --amend $FRANKENPHP_IMAGE_NAME:$TAG_PREFIX-arm64-$CI_COMMIT_SHORT_SHA --amend $FRANKENPHP_IMAGE_NAME:$TAG_PREFIX-amd64-$CI_COMMIT_SHORT_SHA
    - docker manifest annotate $FRANKENPHP_IMAGE_NAME:$FINAL_IMAGE_TAG $FRANKENPHP_IMAGE_NAME:$TAG_PREFIX-arm64-$CI_COMMIT_SHORT_SHA --arch arm64 --os linux
    - docker manifest annotate $FRANKENPHP_IMAGE_NAME:$FINAL_IMAGE_TAG $FRANKENPHP_IMAGE_NAME:$TAG_PREFIX-amd64-$CI_COMMIT_SHORT_SHA --arch amd64 --os linux
    - docker manifest push --purge $FRANKENPHP_IMAGE_NAME:$FINAL_IMAGE_TAG

# build-manifest-main/rc/latest are static tags
# That are in additional to the regular commit-hash suffixed tags
build-manifest-main:
  extends: build-manifest
  variables:
    # `TAG_PREFIX`` must be set again as the rules block here overwrites the one in .build-images
    # So the `TAG_PREFIX` would have been set back to the default `build`
    TAG_PREFIX: dev
    FINAL_IMAGE_TAG: main
  rules:
    - if: "$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH"


build-manifest-rc:
  extends: build-manifest
  variables:
    TAG_PREFIX: rc 
    FINAL_IMAGE_TAG: release-candidate
  rules:
    - if: '$CI_COMMIT_REF_NAME =~ /^release\S*/'

build-manifest-latest:
  extends: build-manifest
  variables:
    TAG_PREFIX: release
    FINAL_IMAGE_TAG: latest
  rules:
    - if: $CI_COMMIT_TAG

################################################################################
# Tests
################################################################################

.test-rules:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    # Don't run if there are no changes to core Symfony files or select config files
    # Note that if you create a new branch, tests still always run:
    # https://docs.gitlab.com/ee/ci/yaml/#ruleschanges
    - if: $CI_COMMIT_BRANCH
      changes:
        - assets/**/*
        - bin/**/*
        - config/**/*
        - src/**/*
        - templates/**/*
        - tests/**/*
        - public/**/*
        - phpunit.xml.dist
        - phpunit.xml.fastest
        - codeception.yml.dist
        - composer.json
        - composer.lock
        - .gitlab-ci.yml

build-webpack:
  stage: build
  tags:
    - tests
  image:
    name: node:lts-alpine
  script:
    - npm install
    - npm run build
  interruptible: true
  artifacts:
    expire_in: 3 hrs
    paths:
      - public/build
  cache:
    key: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    paths:
      - node_modules
  rules:
    - !reference [.test-rules, rules]

.php:
  image: php:$PHP_VERSION-alpine
  cache:
    key: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    paths:
      - vendor/
  interruptible: true
  before_script:
    - echo $CI_COMMIT_REF_NAME
    - echo $CI_COMMIT_BRANCH
    - php --version
    # Set the memory limit to 512MB - which seems to be the minimum to not crash during cache clearing
    - echo "memory_limit = 512M" >> /usr/local/etc/php/conf.d/docker-php-mem-limit.ini
    # Install https://github.com/mlocati/docker-php-extension-installer to simplify PHP extension installation
    - curl -sSLf -o /usr/local/bin/install-php-extensions https://github.com/mlocati/docker-php-extension-installer/releases/latest/download/install-php-extensions && chmod +x /usr/local/bin/install-php-extensions
    # Install php extensions
    # pdo is required for database access
    # opcache is pre-installed and enabled since PHP 8.5
    # pcntl is required for php processes - used by the php dev server and psalm's concurrent execution
    # posix is required for psalm's concurrent execution
    - install-php-extensions @composer bcmath intl pdo pdo_mysql pcntl posix redis
    # - curl --silent --show-error https://getcomposer.org/installer | php
    - composer install --prefer-dist

.codeception-functional:
  extends: .php
  # Debian version of the image - Alpine seems to have issues (segfaults) with frankenphp commands
  image: dunglas/frankenphp:$FRANKENPHP_VERSION-php$PHP_VERSION
  services:
    # "CI/CD variables are supported, but not for alias."
    # https://gitlab.com/gitlab-org/gitlab/-/issues/19561
    - name: sj26/mailcatcher:$CI_MAILCATCHER_VERSION
      alias: mailer
    - name: mariadb:$MARIADB_VERSION
      alias: testdb
    - name: valkey/valkey:$VALKEY_VERSION
      alias: valkey
  variables:
    CODECEPTION_TEST_SUITE: Functional
  tags:
    - tests
  stage: test
  script:
    - php bin/console cache:clear --env=test --no-debug
    - php bin/console --env=dev doctrine:schema:update --force
    - php bin/console --env=dev doctrine:fixtures:load --no-interaction --group=DevTestFixtures
    - php bin/console dbal:run-sql "$(cat src/SQLReports/ViewSetup.sql)"
    - cp -rf codeception.yml.dist codeception.yml
    - vendor/bin/codecept build
    # Start frankenphp simple web server in background
    - nohup frankenphp php-server -r public/ -l :80 > /dev/null 2>&1 &
    # Allow server to start up
    - sleep 2
    - vendor/bin/codecept run $CODECEPTION_TEST_SUITE --env ci || vendor/bin/codecept run -g failed --env ci
  artifacts:
    paths:
      - tests/_output/
      - var/log/
    when: on_failure
    expire_in: 3 hrs
  needs:
    - job: build-webpack
      artifacts: true
  rules:
    - !reference [.test-rules, rules]

codeception-cms:
  extends: .codeception-functional
  variables:
    CODECEPTION_TEST_SUITE: tests/Functional/Cms

codeception-ops:
  extends: .codeception-functional
  variables:
    CODECEPTION_TEST_SUITE: tests/Functional/Ops

# contains a mixture of unit, integration, functional (API) tests
phpunit:
  extends: .php
  # # Gitlab 15.3 does not yet support variables for service aliases
  services:
    - name: sj26/mailcatcher:$CI_MAILCATCHER_VERSION
      alias: mailer
  tags:
    - tests
  stage: test
  script:
    # https://github.com/liuggio/fastest?tab=readme-ov-file#usage
    # Find all files ending in Test.php that don't contain the string "Email" (we'll run email tests separately)
    # Pass these test files to fastest to run
    # Fastest should run a command to setup the test-db tables BEFORE executing the tests
    - find tests/ -name "*Test.php" | grep -v "/Email/" | ./vendor/liuggio/fastest/fastest -b "php bin/console doctrine:schema:create --env=test" "vendor/phpunit/phpunit/phpunit {};"
    - vendor/bin/phpunit --group email
  artifacts:
    paths:
      - var/log/
    when: on_failure
    expire_in: 3 hrs
  needs:
    - job: build-webpack
      artifacts: true
  retry:
    max: 1
    when: script_failure
  rules:
    - !reference [.test-rules, rules]

################################################################################
# Deployments
################################################################################

.ecs-deploy:
  stage: deploy
  interruptible: true
  tags:
    - deploy
  # https://github.com/fabfuel/ecs-deploy
  image: fabfuel/ecs-deploy:1.14.1
  variables:
    AWS_ACCESS_KEY_ID: $GL_AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: $GL_AWS_SECRET_ACCESS_KEY
    # build- prefixed images are kept for 24 hours (see AWS ECR lifecycle policy)
    # Note that as we manually create the manifest, there are 3 "images" per build (manifest-index, ARM64, AMD64)
    # https://eu-west-2.console.aws.amazon.com/ecr/repositories/private/376373716954/yielderverse/backoffice-frankenphp/_/lifecycle-policy?region=eu-west-2
    TAG_PREFIX: build 
    TAG_TO_DEPLOY: "$TAG_PREFIX-$CI_COMMIT_SHORT_SHA"
    # Set DEPLOY_TIMEOUT to -1 if you don't want ecs-deploy to wait for ECS steady state
    DEPLOY_TIMEOUT: 720 
  before_script:
    - echo $TAG_TO_DEPLOY
  dependencies: [] # Clear any dependencies on earlier jobs and artifacts
  when: manual

.ecs-deploy-with-task:
  extends: .ecs-deploy
  script:
    - ecs deploy yielderverse-core backoffice-$ECS_DEPLOYMENT_ENV --tag $TAG_TO_DEPLOY --task backoffice-$ECS_DEPLOYMENT_ENV --timeout $DEPLOY_TIMEOUT
    - ecs deploy yielderverse-core backoffice-worker-$ECS_DEPLOYMENT_ENV --tag $TAG_TO_DEPLOY --task backoffice-worker-$ECS_DEPLOYMENT_ENV --timeout $DEPLOY_TIMEOUT
    - ecs scale yielderverse-core backoffice-$ECS_DEPLOYMENT_ENV 1
    # Run fixtures task
    - echo "Using task script $ECS_TASK_SCRIPT with service backoffice-$ECS_DEPLOYMENT_ENV using container yielderverse-backoffice-$ECS_DEPLOYMENT_ENV" 
    - ecs run yielderverse-core backoffice-$ECS_DEPLOYMENT_ENV --launchtype=FARGATE --public-ip --securitygroup $AWS_VPC_SG_ECS_BACKEND --securitygroup $AWS_VPC_SG_HTTPS_OUT --subnet $AWS_VPC_PUBLIC_SUBNET_DEFAULT --command yielderverse-backoffice-$ECS_DEPLOYMENT_ENV "/bin/sh -c $ECS_TASK_SCRIPT"

deploy-ecs-dev:
  extends: .ecs-deploy-with-task
  variables:
    ECS_DEPLOYMENT_ENV: "dev"
    ECS_TASK_SCRIPT: devops/scripts/prepare-and-apply-fixtures.sh
  rules:
    - if: "$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH"
      when: on_success
      variables:
        TAG_PREFIX: dev # There should always be a dev- prefixed image available
    # Available for manual deployment from other commits (requires you to have manually triggered build jobs)       
    - if: $CI_PIPELINE_SOURCE != 'merge_request_event'
      when: manual

deploy-ecs-release-candidate:
  extends: .ecs-deploy-with-task
  variables:
    TAG_PREFIX: rc
    ECS_DEPLOYMENT_ENV: "rc"
    ECS_TASK_SCRIPT: devops/scripts/prepare-and-apply-fixtures.sh
  rules:
    - if: '$CI_COMMIT_REF_NAME =~ /^release\S*/'
      when: on_success

deploy-ecs-staging:
  extends: .ecs-deploy-with-task
  variables:
    TAG_PREFIX: rc
    ECS_DEPLOYMENT_ENV: "staging"
    ECS_TASK_SCRIPT: devops/scripts/run-migrations.sh # staging db should not use fixtures, but should use migrations
  rules:
    - if: '$CI_COMMIT_REF_NAME =~ /^release\S*/'
      when: on_success
    - if: "$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH"
      when: manual
      variables:
        TAG_PREFIX: dev

deploy-ecs-demo:
  extends: .ecs-deploy-with-task
  variables:
    TAG_TO_DEPLOY: "main"
    ECS_DEPLOYMENT_ENV: "demo"
    ECS_TASK_SCRIPT: devops/scripts/demo/prepare-and-apply-fixtures.sh
  rules:
    - if: "$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH"
      when: manual
      variables:
        TAG_PREFIX: dev # Similar to deploy to dev

deploy-ecs-prod-beta:
  extends: .ecs-deploy
  script:
    - ecs deploy yielderverse-core backoffice-beta --tag $TAG_TO_DEPLOY --task backoffice-beta --timeout $DEPLOY_TIMEOUT --account $AWS_ACCOUNT_ID_PROD --assume-role CI_ECSDeployer
    - ecs deploy yielderverse-core backoffice-worker-beta --tag $TAG_TO_DEPLOY --task backoffice-worker-beta --timeout $DEPLOY_TIMEOUT --account $AWS_ACCOUNT_ID_PROD --assume-role CI_ECSDeployer
    # - ecs scale yielderverse-core backoffice-beta 1 --account $AWS_ACCOUNT_ID_PROD --assume-role CI_ECSDeployer
  rules:
    # Allow manual deploys to prod beta from main branch (might be unstable code)
    - if: "$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH"
      when: manual
      variables:
        TAG_TO_DEPLOY: main
    - if: $CI_COMMIT_TAG
      when: on_success
      variables:
        TAG_TO_DEPLOY: release-$CI_COMMIT_TAG

deploy-ecs-prod-live:
  extends: .ecs-deploy
  variables:
    TAG_TO_DEPLOY: release-$CI_COMMIT_TAG
  script:
    - ecs deploy yielderverse-core backoffice-prod --tag $TAG_TO_DEPLOY --task backoffice-prod --timeout $DEPLOY_TIMEOUT --account $AWS_ACCOUNT_ID_PROD --assume-role CI_ECSDeployer
    - ecs deploy yielderverse-core backoffice-worker-prod --tag $TAG_TO_DEPLOY --task backoffice-worker-prod --timeout $DEPLOY_TIMEOUT --account $AWS_ACCOUNT_ID_PROD --assume-role CI_ECSDeployer
  rules:
    - if: $CI_COMMIT_TAG
      when: manual

run-ecs-task-prod-migrations:
  extends: .ecs-deploy
  variables:
    # Defaults to prod-beta as that is deployed before prod-live
    # Can more readily run migrations BEFORE deployment to prod-live
    ECS_DEPLOYMENT_ENV: "beta"
    TAG_TO_DEPLOY: release-$CI_COMMIT_TAG
  script:
    - ecs run yielderverse-core backoffice-$ECS_DEPLOYMENT_ENV --account $AWS_ACCOUNT_ID_PROD --assume-role CI_ECSDeployer --launchtype=FARGATE --public-ip --securitygroup $AWS_VPC_SG_ECS_BACKEND_PROD --securitygroup $AWS_VPC_SG_HTTPS_OUT_PROD --subnet $AWS_VPC_PUBLIC_SUBNET_DEFAULT_PROD --command yielderverse-backoffice-$ECS_DEPLOYMENT_ENV "/bin/sh -c devops/scripts/run-migrations.sh"
  rules:
    - if: $CI_COMMIT_TAG
      when: manual

start-ecs-service:
  extends: .ecs-deploy
  variables:
    # Used to start any service in dev ECS cluster
    # Defaults to mailpit
    ECS_SERVICE_NAME: "mailpit"
  script:
    - echo $ECS_SERVICE_NAME
    - ecs scale yielderverse-core $ECS_SERVICE_NAME 1

.staging-db-setup:
  image: alpine:3.20
  stage: deploy
  interruptible: true
  tags:
    - arm
  variables:
    AWS_ACCESS_KEY_ID: $GL_AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: $GL_AWS_SECRET_ACCESS_KEY
  rules:
    - if: '$CI_COMMIT_REF_NAME =~ /^release\S*/'
      when: manual
    - if: "$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH"
      when: manual
  before_script:
    - apk update && apk add --no-cache aws-cli mariadb-client bash wget
    # Enable dualstack default endpoint for S3
    - aws configure set default.s3.use_dualstack_endpoint true
    # Download the RDS certificate bundle for eu-west-2
    - wget --inet4-only https://truststore.pki.rds.amazonaws.com/eu-west-2/eu-west-2-bundle.pem -P /home
  dependencies: []
  
staging-db-new-load:
  extends: .staging-db-setup
  script:
    - bash devops/scripts/staging/load-new.sh
  
staging-db-reload-recent:
  extends: .staging-db-setup
  script:
    - bash devops/scripts/staging/load-checkpoint.sh

