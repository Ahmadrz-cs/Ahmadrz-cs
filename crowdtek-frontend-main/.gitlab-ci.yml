################################################################################
# Deployments
################################################################################

.ecs-deploy:
  stage: deploy
  interruptible: true
  tags:
    - deploy
  # https://github.com/fabfuel/ecs-deploy
  image: fabfuel/ecs-deploy:1.14.1
  variables:
    AWS_ACCESS_KEY_ID: $GL_AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: $GL_AWS_SECRET_ACCESS_KEY
    # build- prefixed images are kept for 24 hours (see AWS ECR lifecycle policy)
    # Note that as we manually create the manifest, there are 3 "images" per build (manifest-index, ARM64, AMD64)
    # https://eu-west-2.console.aws.amazon.com/ecr/repositories/private/376373716954/yielderverse/frontend-frankenphp/_/lifecycle-policy?region=eu-west-2
    TAG_PREFIX: build 
    TAG_TO_DEPLOY: "$TAG_PREFIX-$CI_COMMIT_SHORT_SHA"
    # Set DEPLOY_TIMEOUT to -1 if you don't want ecs-deploy to wait for ECS steady state
    DEPLOY_TIMEOUT: 720 
  before_script:
    - echo $TAG_TO_DEPLOY
  script:
    # Speed up deployments by shutting down containers, deploying, then starting back up
    # This is for non-prod envs only, prod should let AWS ECS deal with the managed deploy
    - ecs scale yielderverse-core frontend-$ECS_DEPLOYMENT_ENV 0
    - sleep 15 # Give an opportunity for any existing tasks to drain
    - ecs deploy yielderverse-core frontend-$ECS_DEPLOYMENT_ENV --tag $TAG_TO_DEPLOY --task phpfrontend-$ECS_DEPLOYMENT_ENV --timeout $DEPLOY_TIMEOUT
    - ecs scale yielderverse-core frontend-$ECS_DEPLOYMENT_ENV 1
  dependencies: [] # Clear any dependencies on earlier jobs and artifacts
  when: manual

deploy-ecs-dev:
  extends: .ecs-deploy
  variables:
    ECS_DEPLOYMENT_ENV: "dev"
  rules:
    - if: "$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH"
      when: on_success
      variables:
        TAG_PREFIX: dev # There should always be a dev- prefixed image available
    # Available for manual deployment from other commits (requires you to have manually triggered build jobs)       
    - if: $CI_PIPELINE_SOURCE != 'merge_request_event'
      when: manual

deploy-ecs-release-candidate:
  extends: .ecs-deploy
  variables:
    TAG_PREFIX: rc
    ECS_DEPLOYMENT_ENV: "rc"
  rules:
    - if: '$CI_COMMIT_REF_NAME =~ /^release\S*/'
      when: on_success

deploy-ecs-staging:
  extends: .ecs-deploy
  variables:
    TAG_PREFIX: rc
    ECS_DEPLOYMENT_ENV: "staging"
  rules:
    - if: '$CI_COMMIT_REF_NAME =~ /^release\S*/'
      when: on_success
    - if: "$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH"
      when: manual
      variables:
        TAG_PREFIX: dev

deploy-ecs-demo:
  extends: .ecs-deploy
  variables:
    TAG_TO_DEPLOY: "main"
    ECS_DEPLOYMENT_ENV: "demo"
  rules:
    - if: "$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH"
      when: manual
      variables:
        TAG_PREFIX: dev # Similar to deploy to dev

deploy-ecs-prod-beta:
  extends: .ecs-deploy
  script:
    - ecs deploy yielderverse-core frontend-beta --tag $TAG_TO_DEPLOY --task phpfrontend-beta --timeout $DEPLOY_TIMEOUT --account $AWS_ACCOUNT_ID_PROD --assume-role CI_ECSDeployer
    # - ecs scale yielderverse-core frontend-beta 1 --account $AWS_ACCOUNT_ID_PROD --assume-role CI_ECSDeployer
  rules:
    # Allow manual deploys to prod beta from main branch (might be unstable code)
    - if: "$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH"
      when: manual
      variables:
        TAG_TO_DEPLOY: main
    - if: $CI_COMMIT_TAG
      when: on_success
      variables:
        TAG_TO_DEPLOY: release-$CI_COMMIT_TAG

deploy-ecs-prod-live:
  extends: .ecs-deploy
  variables:
    TAG_TO_DEPLOY: release-$CI_COMMIT_TAG
  script:
    - ecs deploy yielderverse-core frontend-prod --tag $TAG_TO_DEPLOY --task phpfrontend-prod --timeout $DEPLOY_TIMEOUT --account $AWS_ACCOUNT_ID_PROD --assume-role CI_ECSDeployer
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
