services:
  front-ci.dev:
    image: php:8.2-alpine
    command: sleep infinity
    restart: unless-stopped
    environment:
      API_ENDPOINT_CORE: "http://backoffice"
      API_ENDPOINT_ACCOUNT: "http://backoffice"
      MAILCATCHER_URL: "http://mailer:1080"
    volumes:
      - .:/app
    ports:
      # HTTP
      - target: 80
        published: 80
        protocol: tcp
  mailer:
    image: sj26/mailcatcher:latest
    # ports:
    #   - 1080:1080
    #   - 1025:1025
  selenium-chrome:
    image: selenium/standalone-chrome:98.0
    environment:
      SCREEN_WIDTH: 1680
      SCREEN_HEIGHT: 1050
      SCREEN_DPI: 96
      SE_NODE_MAX_SESSIONS: 2
    volumes:
      - /dev/shm:/dev/shm # share the memory shm to avoid memory issues with Chrome
  citestdb:
    image: mariadb:10.6.18
    volumes:
      - mariadb-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: RomeoOscar1520
      MYSQL_DATABASE: crowddb
      MYSQL_USER: ydev
      MYSQL_PASSWORD: YankeeDelta522
  backoffice:
    image: 376373716954.dkr.ecr.eu-west-2.amazonaws.com/yielderverse/backoffice-frankenphp:release-candidate
    restart: unless-stopped
    environment:
      SERVER_NAME: ":80"
      DATABASE_HOST: citestdb
      DATABASE_URL: "mysql://ydev:YankeeDelta522@citestdb:3306/crowddb?serverVersion=mariadb-10.6.18"
      CONTEGO_TRANSACTION_REF: cpd-1
      MAILER_DSN: "smtp://mailer:1025"
      APP_FRONTEND_URL: http://front-ci.dev
  adminer:
    image: adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: citestdb

volumes:
  mariadb-data: