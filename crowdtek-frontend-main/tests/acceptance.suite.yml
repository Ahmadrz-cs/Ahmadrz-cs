# Codeception Test Suite Configuration
#
# Suite for acceptance tests.
# Perform tests in browser using the WebDriver or PhpBrowser.
# If you need both WebDriver and PHPBrowser tests - create a separate suite.

actor: AcceptanceTester
modules:
    enabled:
        - Asserts
        - Sequence
        - Db:
            # db config in codeception.yml
            # uncomment the dump and populate if running tests adhoc
            # password: null
            dump: tests/_data/test_db_with_fixtures.sql
            populate: true
            populator: 'mysql -u $user -h $host $dbname -p$password < $dump'
        - WebDriver:
            url: 'http://local.qac.com'
#            browser: firefox
            browser: chrome
            window_size: 1680x1050
            pageload_timeout: 120
            wait: 2
            
env:
    local-chrome:
         modules:
            config:
                WebDriver:
                    url: 'http://local.qac.com'
                    browser: chrome
                    window_size: 1680x1050
