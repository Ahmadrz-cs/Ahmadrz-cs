services:
  frankenphp:
    # image: dunglas/frankenphp:${BASE_FRANKENPHP_TAG:-latest}
    build:
      context: .
      dockerfile: frankenphp/Dockerfile
      args:
        BASE_FRANKENPHP_TAG: "${BASE_FRANKENPHP_TAG:-latest}"
    restart: unless-stopped
    # Use Traefik proxy instead
    # If you want to directly expose ports, avoid using the default ports 80 and 443
    # ports:
      # HTTP
      # - target: 80
      #   published: ${HTTP_PORT:-80}
      #   protocol: tcp
      # # HTTPS
      # - target: 443
      #   published: ${HTTPS_PORT:-443}
      #   protocol: tcp
      # # HTTP/3
      # - target: 443
      #   published: ${HTTP3_PORT:-443}
      #   protocol: udp
    labels:
      # Explicitly tell Traefik to expose this container
      traefik.enable: true
      # The domain(s) the service will respond to
      traefik.http.routers.frankenphp_front.rule: "Host(`front.dev.local`)"
      # Allow request only from the predefined entry point named "web"
      traefik.http.routers.frankenphp_front.entrypoints: "web"
      # Specify the network Traefik should use
      traefik.docker.network: "yielderverse-back_net-common"
      # Workaround for port-is-missing issue
      traefik.http.services.frankenphp_front.loadbalancer.server.port: 80
    environment:
      SERVER_NAME: ${SERVER_NAME:-http://localhost}, php:80
      CADDY_GLOBAL_OPTIONS: "auto_https off"
    networks:
      yielderverse-back_net-common:
        aliases:
          - front.dev.local
    volumes:
      - ..:/app # mount project files
      - ./frankenphp/Caddyfile:/etc/caddy/Caddyfile # customised Caddyfile to change document root to web/ instead of public/
      - caddy_data:/data
      - caddy_config:/config

networks:
  yielderverse-back_net-common:
    external: true

volumes:
  caddy_data:
  caddy_config:
